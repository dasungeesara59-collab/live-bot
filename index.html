<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookmap Pro | Standalone</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        /* 🎨 BASE THEME (Extracted from style.css) */
        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #111827;
            --bg-card: rgba(17, 24, 39, 0.8);
            --border: rgba(75, 85, 99, 0.3);
            --text-primary: #f9fafb;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-orange: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #000;
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }

        /* 🚀 MODAL OVERRIDES FOR STANDALONE */
        .modal-content {
            width: 100vw !important;
            height: 100vh !important;
            background: #000 !important;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        #heatmapModal.pro-mode .modal-content {
            padding: 0 !important;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 10px;
        }

        /* Timeframe Buttons */
        .tf-btn {
            padding: 4px 10px;
            font-size: 10px;
            border-radius: 6px;
            background: none;
            color: #888;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tf-btn.active { background: #3b82f6; color: #fff; }
        .tf-btn:hover:not(.active) { background: rgba(255,255,255,0.05); }

        /* Controls */
        input[type="range"] { accent-color: var(--accent-blue); }
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
            border: none;
            padding: 4px 12px;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
        }

        /* Pro Toolbar */
        .pro-toolbar {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%) translateY(-60px);
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 24px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 20px;
            z-index: 10001;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
        }
        .pro-mode:hover .pro-toolbar { transform: translateX(-50%) translateY(0); opacity: 1; }

        /* Dashboard & Canvases */
        #heatmapDashboard {
            flex: 1;
            display: flex;
            width: 100%;
            gap: 2px;
            background: #000;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            overflow: hidden;
            min-height: 0; /* Important for flex child */
        }

        .canvas-container { position: relative; flex: 1; overflow: hidden; }
        .dom-sidebar {
            width: 180px;
            background: #0a0a0a;
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
        }
        .dom-header {
            padding: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 10px;
            font-weight: 800;
            text-align: center;
            color: var(--text-muted);
            letter-spacing: 1px;
            background: #000;
        }

        /* Footer */
        #heatmapFooter {
            margin-top: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5px;
        }

        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
            70% { box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        /* 📱 MOBILE RESPONSIVENESS */
        @media (max-width: 768px) {
            .modal-header { flex-direction: column; align-items: flex-start; gap: 10px; }
            .modal-header > div { width: 100%; justify-content: space-between; flex-wrap: wrap; }
            
            /* Larger Sliders for Touch */
            input[type="range"] { height: 12px !important; width: 60px !important; }
            
            /* Bigger touch targets */
            .tf-btn { padding: 8px 12px; font-size: 12px; }
            
            /* Allow controls to wrap */
            .modal-header > div:nth-child(2) { flex-wrap: wrap; gap: 10px; justify-content: center; }
            
            /* DOM Sidebar narrower on mobile */
            .dom-sidebar { width: 120px; }
            
            /* Hide status texts to save space */
            .modal-header h2 { display: none; }
            #heatmapPairBadge { width: 70px !important; }
        }
    </style>
</head>
<body>

    <div id="heatmapModal" class="modal">
        <div class="modal-content">
            
            <!-- Header Controls (Same as Original) -->
            <div class="modal-header">
                <div style="display:flex; align-items:center; gap:15px;">
                    <div style="background:#000; border:1px solid rgba(255,255,255,0.1); border-radius:8px; padding:6px 10px; display:flex; align-items:center; gap:8px;">
                        <span style="font-size:18px;">📉</span>
                        <div style="display:flex; align-items:center; gap:12px;">
                            <h2 style="margin:0; font-size:14px; font-weight:800; color:#fff; letter-spacing:1px; text-transform:uppercase;">BOOKMAP PRO</h2>
                            <button onclick="toggleProMode()" class="btn-primary" style="padding:4px 12px; font-size:10px;">🚀 GO PRO (FULLSCREEN)</button>
                        </div>
                        <div style="display:flex; align-items:center; gap:6px; background:rgba(16,185,129,0.1); padding:4px 10px; border-radius:6px; border:1px solid rgba(16,185,129,0.3);">
                            <div style="width:6px; height:6px; background:#10b981; border-radius:50%; animation:pulse-green 1s infinite;"></div>
                            <span style="font-size:10px; font-weight:800; color:#10b981; letter-spacing:1px;">LIVE</span>
                        </div>
                        <div style="display:flex; align-items:center; gap:10px; background:rgba(255,255,255,0.03); padding:2px 10px; border-radius:6px; border:1px solid rgba(255,255,255,0.05);">
                            <span style="font-size:10px; color:var(--text-muted);">Pair:</span>
                            <input id="heatmapPairBadge" 
                                   style="background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:4px; color:#fff; font-size:10px; font-weight:700; width:90px; outline:none; text-transform:uppercase; padding:2px 6px; cursor:text;" 
                                   value="BTC/USDT"
                                   placeholder="BTC/USDT"
                                   onkeydown="if(event.key === 'Enter') openHeatmap(this.value.trim().toUpperCase())"
                                   title="Type pair and press Enter (e.g. ETH/USDT)">
                        </div>
                    </div>
                </div>

                <div style="display:flex; align-items:center; gap:20px;">
                    <!-- Timeframes -->
                    <div style="display:flex; background:rgba(255,255,255,0.05); padding:3px; border-radius:8px; border:1px solid rgba(255,255,255,0.1);">
                        <button onclick="setTimeframe(60000)" class="tf-btn active">1M</button>
                        <button onclick="setTimeframe(180000)" class="tf-btn">3M</button>
                        <button onclick="setTimeframe(300000)" class="tf-btn">5M</button>
                        <button onclick="setTimeframe(900000)" class="tf-btn">15M</button>
                        <button onclick="setTimeframe(1800000)" class="tf-btn">30M</button>
                        <button onclick="setTimeframe(3600000)" class="tf-btn">1H</button>
                    </div>

                    <!-- Visual Sliders -->
                    <div style="display:flex; gap:10px; align-items:center; background:rgba(255,255,255,0.05); padding:4px 12px; border-radius:10px; border:1px solid rgba(255,255,255,0.1);">
                        <div style="display:flex; align-items:center; gap:6px;">
                            <span style="font-size:10px; color:var(--text-muted);">Heat:</span>
                            <input type="range" id="heatFilterSlider" min="0" max="1" step="0.05" value="0.3" style="width:50px; height:4px; accent-color:#f59e0b;" oninput="updateHeatSensitivity(this.value)">
                        </div>
                        <div style="display:flex; align-items:center; gap:6px;">
                            <span style="font-size:10px; color:var(--text-muted);">Size:</span>
                            <input type="range" id="bubbleSizeSlider" min="0.1" max="10" step="0.5" value="1" style="width:50px; height:4px; accent-color:#3b82f6;" oninput="updateBubbleScale(this.value)">
                        </div>
                        <div style="display:flex; align-items:center; gap:6px; border-left:1px solid rgba(255,255,255,0.1); padding-left:8px;">
                            <span style="font-size:10px; color:#3b82f6; font-weight:800;">ZOOM-X:</span>
                            <input type="range" id="timeZoomSlider" min="10" max="600" step="10" value="120" style="width:60px; height:4px; accent-color:#3b82f6;" oninput="updateTimeZoom(this.value)">
                        </div>
                        <div style="display:flex; align-items:center; gap:6px;">
                            <span style="font-size:10px; color:#ff00ff; font-weight:800;">WHALES:</span>
                            <input type="range" id="whaleSizeSlider" min="1.0" max="5.0" step="0.2" value="1.0" style="width:50px; height:4px; accent-color:#ff00ff;" oninput="updateWhaleSize(this.value)">
                        </div>
                        <div style="display:flex; align-items:center; gap:6px; border-left:1px solid rgba(255,255,255,0.1); padding-left:8px;" title="Adjust DOM Aggregation">
                            <span style="font-size:10px; color:#8b5cf6; font-weight:800;">DOM-AGG:</span>
                            <input type="range" id="domAggSlider" min="-4" max="4" step="1" value="0" style="width:50px; height:4px; accent-color:#8b5cf6;" oninput="updateDomAggregation(this.value)">
                        </div>
                    </div>

                    <!-- Toggles -->
                    <div style="display:flex; gap:12px; align-items:center; background:rgba(255,255,255,0.02); padding:4px 12px; border-radius:10px; border:1px solid rgba(255,255,255,0.05);">
                        <div style="display:flex; align-items:center; gap:4px;">
                            <input type="checkbox" id="showBubbles" checked><label for="showBubbles" style="font-size:10px; color:var(--text-muted);">Bubbles</label>
                        </div>
                        <div style="display:flex; align-items:center; gap:4px;">
                            <input type="checkbox" id="showCandles" checked><label for="showCandles" style="font-size:10px; color:var(--text-muted);">Candles</label>
                        </div>
                        <div style="display:flex; align-items:center; gap:4px;">
                            <input type="checkbox" id="showPOC" checked><label for="showPOC" style="font-size:10px; color:var(--text-muted);">POC</label>
                        </div>
                    </div>

                    <div style="display:flex; align-items:center; gap:10px;">
                        <button id="muteBtn" onclick="toggleMute()" style="background:none; border:none; cursor:pointer; color:#fff; font-size:14px; opacity:0.7;">🔊</button>
                    </div>
                </div>
            </div>

            <!-- Floating Pro Toolbar -->
            <div class="pro-toolbar" id="proToolbar">
                <div style="font-size:12px; font-weight:900; color:#3b82f6; margin-right:10px; border-right:1px solid rgba(255,255,255,0.1); padding-right:10px;">PRO MODE</div>
                <div style="display:flex; gap:5px;" id="proTfGroup"></div>
                <div style="display:flex; align-items:center; gap:8px;">
                    <span style="font-size:10px; color:rgba(255,255,255,0.5);">Heat:</span>
                    <input type="range" id="proHeat" min="0" max="1" step="0.05" value="0.3" style="width:50px;" oninput="updateHeatSensitivity(this.value)">
                </div>
                <div style="display:flex; align-items:center; gap:8px; border-left:1px solid rgba(255,255,255,0.1); padding-left:10px;">
                    <span style="font-size:10px; color:#3b82f6; font-weight:800;">X:</span>
                    <input type="range" id="proZoomX" min="10" max="600" step="10" value="120" style="width:50px;" oninput="updateTimeZoom(this.value)">
                    <span style="font-size:10px; color:#ff00ff; font-weight:800;">W:</span>
                    <input type="range" id="proWhaleSize" min="1.0" max="5.0" step="0.2" value="1.0" style="width:50px;" oninput="updateWhaleSize(this.value)">
                    <span style="font-size:10px; color:#8b5cf6; font-weight:800; margin-left:5px;">DOM:</span>
                    <input type="range" id="proDomAgg" min="-4" max="4" step="1" value="0" style="width:50px;" oninput="updateDomAggregation(this.value)">
                </div>
                <button onclick="toggleProMode()" class="btn-primary" style="background:#ef4444; font-size:10px;">EXIT PRO</button>
            </div>

            <!-- Main Dashboard -->
            <div id="heatmapDashboard">
                <div class="canvas-container">
                    <canvas id="heatmapCanvas"></canvas>
                    <div id="heatmapLastUpdate" style="position:absolute; bottom:10px; left:10px; font-size:9px; color:rgba(255,255,255,0.3); background:rgba(0,0,0,0.5); padding:2px 6px; border-radius:4px;">--:--:--</div>
                </div>
                <div class="dom-sidebar">
                    <div class="dom-header">DEPTH OF MARKET (DOM)</div>
                    <canvas id="domCanvas" style="width:100%; flex:1;"></canvas>
                </div>
            </div>

            <!-- Footer Legend -->
            <div id="heatmapFooter">
                <div style="display:flex; gap:20px; align-items:center;">
                    <div style="display:flex; align-items:center; gap:8px;">
                        <div style="width:30px; height:8px; background:linear-gradient(to right, #001e4c, #ff0000); border-radius:2px;"></div>
                        <span style="font-size:10px; color:var(--text-muted);">Heat Filter</span>
                    </div>
                    <div style="display:flex; align-items:center; gap:8px;">
                        <div style="width:10px; height:10px; border:1px solid #10b981; border-radius:50%; background:rgba(16,185,129,0.2);"></div>
                        <span style="font-size:10px; color:var(--text-muted);">Buy Trade</span>
                    </div>
                    <div style="display:flex; align-items:center; gap:8px;">
                        <div style="width:10px; height:10px; border:1px solid #ef4444; border-radius:50%; background:rgba(239,68,68,0.2);"></div>
                        <span style="font-size:10px; color:var(--text-muted);">Sell Trade</span>
                    </div>
                </div>
                <div style="font-size:10px; color:var(--text-muted); font-weight:600;">BOOKMAP PRO ENGINE V13.0 ⚡ STANDALONE REPLICA</div>
            </div>

        </div>
    </div>

    <!-- Hidden state inputs -->
    <input type="checkbox" id="autoScale" checked style="display:none">
    <input type="checkbox" id="whaleSound" checked style="display:none">
    <input type="checkbox" id="signalSound" checked style="display:none">
    <input type="checkbox" id="showVWAP" style="display:none">
    <input type="checkbox" id="showDeltaBars" style="display:none">
    <input type="checkbox" id="showImbalance" style="display:none">

    <!-- External Scripts -->
    <script src="js/api.js?v=13.7"></script>
    <script src="js/heatmap.js?v=13.7"></script>

    <script>
        // 🔄 STANDALONE INITIALIZATION
        window.onload = function() {
            // Polyfill for localStorage in file:/// mode
            try { localStorage.getItem('test'); } catch(e) {
                window.localStorage = { _data:{}, setItem:function(k,v){this._data[k]=String(v)}, getItem:function(k){return this._data[k]||null}, removeItem:function(k){delete this._data[k]}, clear:function(){this._data={}} };
            }

            console.log("Bookmap Standalone Initializing...");
            if (typeof openHeatmap === 'function') {
                setTimeout(() => {
                    openHeatmap('BTC/USDT');
                    console.log("Bookmap logic started.");
                }, 500);
            } else {
                document.body.innerHTML = `
                    <div style="background:#111; color:#ef4444; padding:50px; text-align:center; font-family:monospace; height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center; gap:20px;">
                        <h1 style="font-size:50px;">❌ Error</h1>
                        <p style="font-size:20px; color:#fff;">js/heatmap.js not found or failed to load.</p>
                        <p style="color:#888;">Ensure you have the 'js' folder next to index.html.</p>
                    </div>`;
            }
        };

        // UI Helpers needed by heatmap.js but normally in app.js
        // window.updateDomAggregation = (val) => { console.log("Agg:", val); }; 
    </script>
</body>
</html>
